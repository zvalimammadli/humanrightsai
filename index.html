<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HumanRightsAI.org</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: #ffffff;
}

/* LANGUAGE SWITCH */
.lang {
  position: absolute;
  top: 20px;
  right: 30px;
  z-index: 10;
}

.lang button {
  background: transparent;
  border: 1px solid #fff;
  color: #fff;
  padding: 5px 10px;
  margin-left: 5px;
  cursor: pointer;
}

/* HERO */
.hero {
  height: 100vh;
  background: url("./Summit 1.png") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
}

.hero-content {
  position: relative;
  text-align: center;
  z-index: 2;
}

.hero h1 {
  font-size: 48px;
  margin: 0;
}

.hero p {
  color: #ccc;
  margin-top: 10px;
}

/* SECTION */
.section {
  padding: 80px 20px;
  max-width: 900px;
  margin: auto;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

/* VIDEO */
.video {
  margin-top: 30px;
}

iframe {
  width: 100%;
  height: 400px;
  border: none;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  border: 1px solid #fff;
  color: #fff;
  text-decoration: none;
}

.btn:hover {
  background: #fff;
  color: #000;
}
</style>
</head>

<body>

<!-- LANGUAGE -->
<div class="lang">
  <button onclick="setLang('en')">ENG</button>
  <button onclick="setLang('az')">AZ</button>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1 data-en="HumanRightsAI.org" data-az="HumanRightsAI.org"></h1>
    <p data-en="Baku Ombudsmen Summit 2026"
       data-az="Bakı Ombudsmanlar Sammiti 2026"></p>
    <p data-en="Human Rights in the Age of Artificial Intelligence"
       data-az="Süni İntellekt Dövründə İnsan Hüquqları"></p>
  </div>
</div>

<!-- ABOUT -->
<div class="section">
  <h2 data-en="About the Platform" data-az="Sayt haqqında"></h2>

  <p data-en="This platform has been established to explore the opportunities and risks arising from the rapid development of artificial intelligence in the context of contemporary global challenges."
     data-az="Bu platforma müasir çağırışlar fonunda sürətlə inkişaf edən süni intellektin yaratdığı imkan və riskləri araşdırmaq məqsədilə yaradılmışdır."></p>

  <p data-en="Its main objective is to promote a human-centered approach and ensure that artificial intelligence contributes to strengthening the protection of human rights."
     data-az="Əsas məqsəd insan mərkəzli yanaşmanı təşviq etmək və süni intellektin insan hüquqlarının müdafiəsinin gücləndirilməsinə xidmət etməsini təmin etməkdir."></p>
</div>

<!-- SUMMIT -->
<div class="section">
  <h2 data-en="Baku Ombudsmen Summit"
      data-az="Bakı Ombudsmanlar Sammiti"></h2>

  <p data-en="The Summit brings together Ombudsman institutions, National Human Rights Institutions and international experts to discuss artificial intelligence and human rights."
     data-az="Sammit Ombudsman təsisatlarını, milli insan hüquqları institutlarını və beynəlxalq ekspertləri süni intellekt və insan hüquqları mövzusunda bir araya gətirir."></p>

  <div class="video">
    <iframe src="https://www.youtube.com/embed/A-O5gbooyAQ"
            allowfullscreen></iframe>
  </div>
</div>

<script>
function setLang(lang) {
  document.querySelectorAll("[data-en]").forEach(el => {
    el.innerText = el.getAttribute("data-" + lang);
  });
}
setLang("en");
</script>

</body>
</html>
